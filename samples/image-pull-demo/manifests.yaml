apiVersion: v1
kind: Namespace
metadata:
  name: ontology-demo
  labels:
    app.kubernetes.io/part-of: kubernetes-ontology-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkout-api
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-config
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
data:
  LOG_LEVEL: info
  CHECKOUT_BACKEND: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: checkout-reader
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: checkout-reader
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
subjects:
  - kind: ServiceAccount
    name: checkout-api
    namespace: ontology-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: checkout-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/part-of: kubernetes-ontology-demo
    spec:
      serviceAccountName: checkout-api
      containers:
        - name: app
          image: ghcr.io/colvin-y/kubernetes-ontology-demo:missing-tag
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: checkout-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: ontology-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: kubernetes-ontology-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: checkout-api
  ports:
    - name: http
      port: 80
      targetPort: http
