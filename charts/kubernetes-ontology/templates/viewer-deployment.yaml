{{- if .Values.viewer.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-ontology.fullname" . }}-viewer
  labels:
    {{- include "kubernetes-ontology.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
spec:
  replicas: {{ .Values.viewer.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubernetes-ontology.viewerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubernetes-ontology.viewerSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: viewer
          image: {{ include "kubernetes-ontology.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /kubernetes-ontology-viewer
          args:
            - --addr
            - {{ .Values.viewer.addr | quote }}
            - --server
            - http://{{ include "kubernetes-ontology.fullname" . }}:{{ .Values.server.service.port }}
          ports:
            - name: http
              containerPort: {{ .Values.viewer.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.viewer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
