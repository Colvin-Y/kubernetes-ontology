apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubernetes-ontology.fullname" . }}
  labels:
    {{- include "kubernetes-ontology.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubernetes-ontology.serverSelectorLabels" . | nindent 4 }}
